<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Production OS V8</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E8A832">
    <meta name="description" content="映像制作の進行管理アプリ — カット管理・香盤・予算・クルー・ロケ地を一元管理">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ProdOS">

    <!-- Material Symbols -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- Tailwind CSS (for layout utilities) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0C0C0F',
                        surface: '#17171B',
                        surface2: '#1E1E24',
                        border: '#2A2A34',
                        border2: '#35353F',
                        primary: '#E8A832',
                        accent: '#EF4565',
                        success: '#34D399',
                        text: '#F2F0EB',
                        muted: '#7A7670',
                    },
                    fontFamily: {
                        display: ['"Space Grotesk"', 'sans-serif'],
                        body: ['"Noto Sans JP"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Global Styles (Vanilla Core overrides) -->
    <link rel="stylesheet" href="style.css">

    <!-- Service & Utils -->
    <script src="utils.js"></script>
    <script src="weather.js"></script>
    <script src="store.js"></script>

    <!-- Screens -->
    <script src="screens/projects.js"></script>
    <script src="screens/project-edit.js"></script>
    <script src="screens/timeline.js"></script>
    <script src="screens/shots.js"></script>
    <script src="screens/logistics.js"></script>
    <script src="screens/budget.js"></script>
    <script src="screens/simulator.js"></script>
    <script src="screens/kanban.js"></script>
    <script src="screens/crew.js"></script>
    <script src="screens/callsheet.js"></script>
    <script src="screens/live.js"></script>
    <script src="screens/manage.js"></script>
</head>

<body class="bg-bg text-text font-body h-[100dvh] overflow-hidden flex flex-col relative">

    <!-- Animated Background Elements -->
    <div id="ambient-bg" class="pointer-events-none fixed inset-0 z-[-1] overflow-hidden">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
        <div class="ambient-blob blob-3"></div>
        <div class="ambient-blob blob-4"></div>
    </div>

    <!-- Main Screen Container -->
    <div id="screen-container" class="flex-1 w-full relative z-0">
        <!-- Screen content gets injected here -->
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-screen="live">
            <span class="material-symbols-outlined">play_circle</span>進行
        </button>
        <button class="nav-btn" data-screen="timeline">
            <span class="material-symbols-outlined">event_note</span>香盤
        </button>
        <button class="nav-btn" data-screen="manage">
            <span class="material-symbols-outlined">settings_suggest</span>管理
        </button>
    </nav>

    <!-- App Drawer (More menu) -->
    <div id="drawer-overlay" class="modal-overlay">
        <div class="modal-sheet !pb-8 !px-5">
            <div class="modal-drag"></div>
            <div class="flex items-center justify-between mb-5">
                <h3 class="!mb-0">拡張機能</h3>
                <button onclick="document.getElementById('drawer-overlay').classList.remove('show')"
                    class="btn-ghost !border-none !p-1 !text-muted"><span
                        class="material-symbols-outlined">close</span></button>
            </div>

            <div class="grid grid-cols-4 gap-3">
                <button class="drawer-btn" data-screen="logistics">
                    <span class="material-symbols-outlined text-primary">location_on</span>ロケ&天気
                </button>
                <button class="drawer-btn" data-screen="simulator">
                    <span class="material-symbols-outlined text-primary">tune</span>シミュ
                </button>

                <button class="drawer-btn" data-screen="crew">
                    <span class="material-symbols-outlined text-primary">groups</span>クルー
                </button>
                <button class="drawer-btn" data-screen="callsheet">
                    <span class="material-symbols-outlined text-primary">description</span>CS印刷
                </button>

            </div>

            <div class="mt-8 pt-4 border-t border-border">
                <p class="section-header">設定</p>
                <div style="display:flex;flex-direction:column;gap:8px">
                    <button id="export-btn"
                        class="flex items-center gap-2 py-3 px-4 rounded-xl text-text border border-border w-full hover:bg-surface2 transition-colors font-display font-bold text-[11px] uppercase tracking-wider">
                        <span class="material-symbols-outlined text-base">download</span>
                        <span>案件をエクスポート</span>
                    </button>
                    <button id="import-btn"
                        class="flex items-center gap-2 py-3 px-4 rounded-xl text-text border border-border w-full hover:bg-surface2 transition-colors font-display font-bold text-[11px] uppercase tracking-wider">
                        <span class="material-symbols-outlined text-base">upload</span>
                        <span>案件をインポート</span>
                    </button>
                    <input type="file" id="import-file-input" accept=".json" style="display:none" />
                    <button id="theme-toggle-btn"
                        class="flex items-center gap-2 py-3 px-4 rounded-xl text-text border border-border w-full hover:bg-surface2 transition-colors font-display font-bold text-[11px] uppercase tracking-wider">
                        <span class="material-symbols-outlined text-base" id="theme-icon">light_mode</span>
                        <span id="theme-label">ライトモード</span>
                    </button>
                    <button id="reset-btn"
                        class="flex items-center gap-2 py-3 px-4 rounded-xl text-accent border border-accent/30 w-full hover:bg-accent/10 transition-colors font-display font-bold text-[11px] uppercase tracking-wider">
                        <span class="material-symbols-outlined text-base">restore</span> 初期データにリセット
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Boot file -->
    <script src="app.js"></script>
</body>

</html>
